<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>حجز موعد | تسجيل الدخول – مجمع فينكس الطبي</title>
  <meta name="description" content="سجّل دخولك بالاسم الثلاثي ورقم الجوال للتحقق من وجود ملفك في مجمع فينكس الطبي، ثم احجز موعدك مباشرة.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://www.phoenixclinic.net/appointment.html">

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --gold-main:#e2be6d;
      --gold-light:#fff8e6;
      --gold-shadow:0 4px 32px 0 #e2be6d26, 0 1.5px 6px #ffdfa215;
    }
    body{ font-family:'Cairo', Tahoma, Arial, sans-serif; margin:0; min-height:100vh; display:flex; flex-direction:column; }

    /* خلفية أوضح بدون ضبابية قوية */
    .bg{
      position:fixed; inset:0;
      background:url('images/حجز الموعد.png') center/cover no-repeat;
      filter:brightness(.98) contrast(1.03) saturate(1.02);
      opacity:.85;
      z-index:0; pointer-events:none;
    }
    body > *:not(.bg){ position:relative; z-index:1; }

    header{ background:rgba(255,255,255,.85); backdrop-filter:saturate(1.2) blur(4px); box-shadow:0 2px 10px rgba(0,0,0,.06); }
    .container.header-flex{ display:flex; align-items:center; justify-content:space-between; max-width:1200px; margin:0 auto; padding:8px 16px; }
    .logo-img{ height:46px; }
    nav ul{ list-style:none; display:flex; gap:10px; margin:0; padding:0; flex-wrap:wrap; }
    nav a{ text-decoration:none; color:#222; font-weight:700; padding:6px 12px; border-radius:999px; }
    nav a.active, nav a:hover{ background:#fffbe7; color:#a8861c; box-shadow:0 2px 8px #e2be6d33; }

    .wrap{ max-width:540px; margin:26px auto; background:rgba(255,255,255,.94); border:1px solid #e8ca7c80; border-radius:18px; box-shadow:var(--gold-shadow); padding:18px; }

    .title{ display:flex; align-items:center; gap:10px; justify-content:center; font-weight:800; color:#a67c0e; margin:6px 0 14px; }
    .title i{ color:var(--gold-main); }

    label{ display:block; font-weight:700; color:#b18836; margin:.5rem 0 .3rem; }
    input, select{
      width:100%; padding:12px 11px; border-radius:14px; border:1.4px solid #e2be6d99; background:#fffdfa; font-size:1rem;
      box-shadow:0 2px 13px #e2be6d0c inset; outline:none; transition:border .2s, box-shadow .2s;
    }
    input:focus, select:focus{ border:1.7px solid #e2be6d; background:#fff9e0; box-shadow:0 2px 18px #e2be6d24; }

    .btn{
      width:100%; padding:13px 0; border:none; border-radius:16px; font-weight:800; letter-spacing:.5px;
      background:linear-gradient(90deg,#e8ca7c 10%, #fff8e6 100%); color:#6b4b00; cursor:pointer; box-shadow:0 6px 16px #e2be6d33; transition:transform .12s;
    }
    .btn:disabled{ opacity:.6; cursor:not-allowed; }
    .btn:hover:not(:disabled){ transform:translateY(-1px); }

    .muted{ color:#7a6d4e; font-size:.95rem; text-align:center; }
    .link{ background:none; border:none; color:#8a640a; text-decoration:underline; cursor:pointer; font-weight:700; }

    .hidden{ display:none; }

    footer{ margin-top:auto; background:rgba(255,255,255,.75); text-align:center; padding:10px; color:#8c6d1c; font-weight:700; }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <header>
    <div class="container header-flex">
      <div class="logo-container">
        <img src="images/logo phoenix-Photoroom.png" alt="شعار مجمع فينكس الطبي" class="logo-img">
      </div>
      <nav aria-label="التنقل">
        <ul>
          <li><a href="index.html">الرئيسية</a></li>
          <li><a href="about.html">من نحن</a></li>
          <li><a href="services.html">الخدمات</a></li>
          <li><a class="active" aria-current="page">احجز موعد</a></li>
          <li><a href="contact.html">اتصل بنا</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ====== القسم 1: تسجيل الدخول ====== -->
  <section id="loginSection" class="wrap">
    <div class="title"><i class="fa fa-user-check"></i> تسجيل الدخول للتحقق من وجود ملف</div>

    <label for="fullname">الاسم الثلاثي</label>
    <input id="fullname" type="text" placeholder="مثال: محمد أحمد سعد" autocomplete="name" inputmode="text">

    <label for="mobile">رقم الجوال</label>
    <input id="mobile" type="text" placeholder="05xxxxxxxx" autocomplete="tel" inputmode="numeric" maxlength="10">

    <div id="loginMsg" class="muted" style="min-height:22px;margin:8px 0;"></div>

    <button id="loginBtn" class="btn" disabled>تسجيل الدخول</button>

    <p class="muted" style="margin-top:10px;">
      لا تملك ملفًا؟ <button class="link" id="openNewFileBtn" type="button">افتح ملف جديد</button>
    </p>
  </section>

  <!-- ====== القسم 2: الحجز (يظهر بعد نجاح الدخول) ====== -->
  <section id="bookingSection" class="wrap hidden">
    <div class="title"><i class="fa-solid fa-calendar-check"></i> الحجز</div>

    <label for="clinic">اختر العيادة</label>
    <select id="clinic">
      <option value="">اختر العيادة</option>
      <option value="عيادة اسنان 5**الفترة الاولى">عيادة اسنان 5 الفترة الصباحية</option>
      <option value="عيادة اسنان 5**الفترة الثانية">عيادة اسنان 5 الفترة المسائية</option>
      <option value="عيادة الاسنان 1**الفترة الاولى">عيادة الاسنان 1 الفترة الصباحية</option>
      <option value="عيادة الاسنان 1**الفترة الثانية">عيادة الاسنان 1 الفترة المسائية</option>
      <option value="عيادة الاسنان 2**الفترة الاولى">عيادة الاسنان 2 الفترة الصباحية</option>
      <option value="عيادة الاسنان 2**الفترة الثانية">عيادة الاسنان 2 الفترة المسائية</option>
      <option value="عيادة الاسنان 3**الفترة الاولى">عيادة الاسنان 3 الفترة الصباحية</option>
      <option value="عيادة الاسنان 3**الفترة الثانية">عيادة الاسنان 3 الفترة المسائية</option>
      <option value="عيادة الاسنان 4**الفترة الاولى">عيادة الاسنان 4 الفترة الصباحية</option>
      <option value="عيادة الاسنان 4**الفترة الثانية">عيادة الاسنان 4 الفترة المسائية</option>
      <option value="عيادة التشقير**الفترة الاولى">عيادة التشقير الفترة الصباحية</option>
      <option value="عيادة التشقير**الفترة الثانية">عيادة التشقير الفترة المسائية</option>
      <option value="عيادة الجلدية والتجميل**الفترة الاولى">عيادة الجلدية والتجميل الفترة الصباحية</option>
      <option value="عيادة الجلدية والتجميل**الفترة الثانية">عيادة الجلدية والتجميل الفترة المسائية</option>
      <option value="عيادة الليزر (1)**الفترة الاولى">عيادة الليزر (1) الفترة الصباحية</option>
      <option value="عيادة الليزر (1)**الفترة الثانية">عيادة الليزر (1) الفترة المسائية</option>
      <option value="عيادة الليزر (2)**الفترة الاولى">عيادة الليزر (2) الفترة الصباحية</option>
      <option value="عيادة الليزر (2)**الفترة الثانية">عيادة الليزر (2) الفترة المسائية</option>
      <option value="عيادة تنظيف البشرة**الفترة الاولى">عيادة تنظيف البشرة الفترة الصباحية</option>
      <option value="عيادة تنظيف البشرة**الفترة الثانية">عيادة تنظيف البشرة الفترة المسائية</option>
      <option value="النساء و الولادة**الفترة الاولى">النساء و الولادة الفترة الصباحية</option>
      <option value="النساء و الولادة**الفترة الثانية">النساء و الولادة الفترة المسائية</option>
    </select>

    <label for="month">اختر الشهر</label>
    <select id="month">
      <option value="">اختر الشهر</option>
      <option value="8">أغسطس</option>
      <option value="9">سبتمبر</option>
      <option value="10">أكتوبر</option>
      <option value="11">نوفمبر</option>
      <option value="12">ديسمبر</option>
    </select>

    <button id="fetchBtn" class="btn" style="margin-top:10px;">بحث عن المواعيد</button>

    <label for="time" style="margin-top:14px;">اختر الوقت</label>
    <select id="time" disabled>
      <option value="">يرجى البحث أولاً</option>
    </select>

    <button id="goConfirm" class="btn" style="margin-top:12px;" disabled>متابعة لتأكيد الحجز</button>

    <div id="bkMsg" class="muted" style="min-height:22px;margin-top:8px;"></div>
  </section>

  <footer>جميع الحقوق محفوظة © مجمع فينكس الطبي 2025</footer>

  <script>
    // ===== التحقق من الاسم الثلاثي ورقم الجوال =====
    const fullname = document.getElementById('fullname');
    const mobile   = document.getElementById('mobile');
    const loginBtn = document.getElementById('loginBtn');
    const loginMsg = document.getElementById('loginMsg');

    function validThreeName(v){
      const words = (v || '').trim().split(/\s+/).filter(Boolean);
      return words.length === 3;
    }
    function validSaudi(v){
      const d = (v || '').replace(/[^0-9]/g,'');
      // يقبل 05xxxxxxxx فقط
      return /^05\d{8}$/.test(d);
    }
    function updateLoginBtn(){
      if (validThreeName(fullname.value) && validSaudi(mobile.value)) {
        loginBtn.disabled = false;
        loginMsg.textContent = '';
      } else {
        loginBtn.disabled = true;
        loginMsg.textContent = 'الاسم يجب أن يكون ثلاثيًا والرقم مثل 05xxxxxxxx';
      }
    }
    fullname.addEventListener('input', updateLoginBtn);
    mobile.addEventListener('input', updateLoginBtn);
    updateLoginBtn();

    // ===== إرسال تسجيل الدخول للسيرفر =====
    loginBtn.addEventListener('click', async () => {
      loginBtn.disabled = true;
      loginMsg.textContent = 'جاري التحقق...';
      try {
        const r = await fetch('/api/login', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ name: fullname.value.trim(), phone: mobile.value.trim() })
        });
        const data = await r.json();
        if (data.success) {
          // نجح — افتح قسم الحجز
          document.getElementById('loginSection').classList.add('hidden');
          document.getElementById('bookingSection').classList.remove('hidden');
          loginMsg.textContent = '';
          // خزن الاسم والرقم لاستخدامات لاحقة إن احتجت
          localStorage.setItem('auth_name', fullname.value.trim());
          localStorage.setItem('auth_phone', mobile.value.trim());
        } else {
          loginMsg.textContent = data.message || 'لم يتم العثور على ملف. يمكنك اختيار "افتح ملف جديد".';
          loginBtn.disabled = false;
        }
      } catch (e) {
        loginMsg.textContent = 'تعذر التحقق حالياً. حاول لاحقاً.';
        loginBtn.disabled = false;
      }
    });

    // افتح ملف جديد — حالياً مجرد تنبيه (اربطه لاحقاً بصفحة إنشاء ملف)
    document.getElementById('openNewFileBtn').addEventListener('click', () => {
      alert('سيتم تحويلك لاحقاً إلى نموذج إنشاء ملف جديد.');
      // مثال: window.location.href = '/new-file.html';
    });

    // ===== قسم الحجز (بعد نجاح الدخول) =====
    const fetchBtn = document.getElementById('fetchBtn');
    const timeSel  = document.getElementById('time');
    const goConfirm = document.getElementById('goConfirm');
    const bkMsg = document.getElementById('bkMsg');

    fetchBtn.addEventListener('click', async () => {
      const clinic = document.getElementById('clinic').value;
      const month  = document.getElementById('month').value;

      bkMsg.textContent = '';
      timeSel.disabled = true;
      goConfirm.disabled = true;
      timeSel.innerHTML = `<option>...جاري جلب الأوقات...</option>`;

      if (!clinic || !month) {
        timeSel.innerHTML = `<option value="">يرجى اختيار العيادة والشهر</option>`;
        return;
      }

      try {
        const r = await fetch('/api/times', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ clinic, month })
        });
        const data = await r.json();
        if (data.times && data.times.length) {
          timeSel.innerHTML = data.times.map(t => `<option value="${t.value}">${t.label}</option>`).join('');
          timeSel.disabled = false;
          goConfirm.disabled = false;
        } else {
          timeSel.innerHTML = `<option value="">لا توجد أوقات متاحة</option>`;
          bkMsg.textContent = 'لا توجد أوقات متاحة حالياً.';
        }
      } catch {
        timeSel.innerHTML = `<option value="">تعذر جلب الأوقات</option>`;
        bkMsg.textContent = 'تعذر جلب الأوقات. حاول لاحقاً.';
      }
    });

    goConfirm.addEventListener('click', () => {
      // خزّن لاستخدام صفحة التأكيد (confirm.html) إن رغبت
      localStorage.setItem('pending_clinic', document.getElementById('clinic').value);
      const clinicName = document.getElementById('clinic').selectedOptions[0]?.text || '';
      localStorage.setItem('pending_clinic_label', clinicName);
      localStorage.setItem('pending_month', document.getElementById('month').value);
      localStorage.setItem('pending_time', timeSel.value);

      // انتقل لصفحة التأكيد الحالية لديك
      window.location.href = 'confirm.html';
    });
  </script>
</body>
</html>
