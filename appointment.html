<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>مجمع فينكس الطبي - حجز موعد</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --main-orange: #ff8300;
      --main-blue: #36bae6;
      --main-gradient: linear-gradient(90deg, #d7a422 15%, #cacaca 100%);
      --main-shadow: 0 8px 36px 0 #2fa4c618, 0 1.5px 6px #ffb87115;
    }
    body {
      font-family: 'Cairo', Tahoma, Arial, sans-serif;
      background: transparent !important;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
    }
    .blur-bg-appointment {
      position: fixed;
      top: 0; right: 0; bottom: 0; left: 0;
      background: url('images/حجز الموعد.png') center center/cover no-repeat;
      filter: blur(16px) brightness(0,97);
      opacity: 0.;
      z-index: 0;
      pointer-events: none;
    }
    body > *:not(.blur-bg-appointment) {
      position: relative;
      z-index: 1;
    }
    .social-icons {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-right: 22px;
    }
    .social-icons .social-icon {
      font-size: 1.3em;
      padding: 0 2px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: #000000;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 1px 6px #000000b6;
      margin-left: 2.5px;
      text-decoration: none;
    }
    .social-icon.wa    { color: #3cff00; border: 1.5px solid #000000; }
    .social-icon.insta { color: #ff0055; border: 1.5px solid #000000; }
    .social-icon.snap  { color: #fff; border: 1.5px solid #000000; background: #181818; }
    .social-icon:hover {
      background: #111;
      box-shadow: 0 2px 14px #000000;
      opacity: 0.96;
    }

    .appointments-title {
      text-align: center;
      margin-top: 45px;
      color: var(--main-orange);
      font-size: 2.3em;
      font-weight: bold;
      letter-spacing: 1.3px;
      text-shadow: 0 2px 15px #ffe5c6c6;
      margin-bottom: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 17px;
      background: rgba(255, 255, 255, 0.214);
      border-radius: 22px;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      padding: 10px 36px 10px 36px;
      box-shadow: 0 2px 15px #000000d4;
      border: 1.5px solid #ffbc9c4a;
      animation: fadeDown 1s;
    }
    .appointments-title .fa-calendar-check {
      font-size: 1.2em;
      color: var(--main-blue);
      filter: drop-shadow(0 1px 10px #2fa5c636);
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px);}
      to   { opacity: 1; transform: translateY(0);}
    }

    .appointments-table-container {
      width: 100%;
      max-width: 950px;
      margin: 25px auto 26px auto;
      background: rgba(255, 255, 255, 0.338);
      border-radius: 30px;
      box-shadow: var(--main-shadow);
      padding: 32px 16px 36px 16px;
      overflow-x: auto;
      min-height: 160px;
      border: 1.8px solid #f7b27838;
      position: relative;
      animation: fadeUp 1.1s;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px);}
      to   { opacity: 1; transform: translateY(0);}
    }
    table.appointments-table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      min-width: 800px;
      background: transparent;
    }
    .appointments-table th {
      background: var(--main-gradient);
      color: #090000;
      font-size: 1.11em;
      font-weight: bold;
      letter-spacing: 1.5px;
      padding: 18px 12px 15px 12px;
      border-bottom: 4px solid #f2f1f06f;
      text-shadow: 0 2px 14px #fff2c653;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 3px 16px #ffe1c420;
      position: relative;
      z-index: 2;
    }
    .appointments-table td {
      padding: 13px 10px;
      text-align: center;
      font-size: 1.09em;
      background: transparent;
      transition: background 0.19s;
      border-bottom: 1.9px solid #e2f6ff48;
    }
    .appointments-table tr.available {
      background: linear-gradient(90deg,#e5fff6 70%,#fff8f0 100%);
      cursor: pointer;
      transition: background 0.18s, box-shadow 0.18s, transform 0.19s;
    }
    .appointments-table tr.available:hover {
      background: linear-gradient(90deg,#abfff0 60%,#fff3e0 100%);
      box-shadow: 0 2px 24px #cdf8e563;
      transform: scale(1.012);
      z-index: 3;
    }
    .appointments-table tr.booked {
      background: linear-gradient(90deg,#ffe8e1 65%,#f8fff7 100%);
      color: #bbb;
      opacity: 0.86;
    }
    .appointments-table tr:last-child td {
      border-bottom: none;
    }
    .appointments-table td.status {
      font-weight: bold;
      font-size: 1.12em;
    }
    .status-badge {
      display: inline-block;
      padding: 8px 23px;
      border-radius: 120px;
      font-size: 1.03em;
      font-weight: bold;
      letter-spacing: 0.7px;
      box-shadow: 0 2px 14px #e9b53c25;
      border: none;
      margin: 0 2px;
      background: #fff;
      transition: transform 0.18s;
      position: relative;
      top: 0;
    }
    .status-badge.available {
      background: linear-gradient(90deg,#27d76b 60%,#36bae6 100%);
      color: #fff;
      border: 1.5px solid #21ad6c;
      box-shadow: 0 2px 18px #3cd8aa70;
      animation: pulse-badge 1.4s infinite alternate;
    }
    .status-badge.booked {
      background: linear-gradient(90deg,#ff5252 60%,#f4c5be 100%);
      color: #fff;
      border: 1.5px solid #d21b1b44;
      box-shadow: 0 2px 14px #ffb3a27a;
      animation: none;
    }
    @keyframes pulse-badge {
      0% { transform: scale(1);}
      100% { transform: scale(1.11);}
    }
    .fa-check-circle, .fa-times-circle {
      font-size: 1.16em;
      margin-left: 7px;
      vertical-align: -2px;
    }
    .fa-check-circle { color: #fff;}
    .fa-times-circle { color: #fff;}
    .tr-hint {
      font-size: 0.99em;
      color: #9f9e9e;
      text-align: center;
      margin: 10px 0 -8px 0;
      letter-spacing: 0.4px;
      display: block;
      font-style: italic;
      background: transparent;
    }
    @media (max-width: 1100px) {
      .appointments-table-container {
        padding: 8px 0vw 16px 0vw;
        margin: 11px 2vw 18px 2vw;
      }
      .appointments-title { font-size: 1.45em; }
      .appointments-table th, .appointments-table td {
        font-size: 0.99em;
        padding: 8px 2px;
      }
    }
    @media (max-width: 600px) {
      .appointments-table-container { border-radius: 13px; }
      .social-icons { gap: 5px; margin-right: 1.5px;}
      .social-icons .social-icon { width: 25px; height: 25px; font-size: 0.97em;}
      .appointments-table th, .appointments-table td { font-size: 0.97em; }
      .appointments-title { font-size: 1em; padding: 7px 8px;}
    }
    footer {
      background: rgba(255, 255, 255, 0.219);
      color: #1b2028;
      text-align: center;
      font-size: 1em;
      font-weight: bold;
      border-top: 1.5px solid #eee;
      letter-spacing: 0.6px;
      padding: 18px 0 12px 0;
      margin-top: auto;
      box-shadow: 0 -2px 12px #d6d6d6;
    }
  </style>
</head>
<body>
  <!-- خلفية باهتة -->
  <div class="blur-bg-appointment"></div>

  <!-- الهيدر مع السوشيال -->
  <header>
    <div class="container header-flex">
      <div class="logo-container">
        <img src="images/logo phoenix-Photoroom.png" alt="شعار العيادة" class="logo-img">
      </div>
      <h1>   </h1>
      <nav>
        <ul>
          <li><a href="index.html">الرئيسية</a></li>
          <li><a href="about.html">من نحن</a></li>
          <li><a href="services.html">الخدمات</a></li>
          <li><a href="appointment.html" class="active">احجز موعد</a></li>
          <li><a href="contact.html">اتصل بنا</a></li>
          <li class="social-icons">
            <a href="https://wa.me/966531422555" target="_blank" title="واتساب" class="social-icon wa"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.instagram.com/phoenix.shq/" target="_blank" title="انستقرام" class="social-icon insta"><i class="fab fa-instagram"></i></a>
            <a href="https://www.snapchat.com/add/phoenix.shq?share_id=VOXDQhmXrWw&locale=ar-AE" target="_blank" title="سناب شات" class="social-icon snap"><i class="fab fa-snapchat-ghost"></i></a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="appointments-title">
    <i class="fa-solid fa-calendar-check"></i>
    المواعيد المتاحة
  </div>
  <span class="tr-hint">اضغط على الموعد المتاح لإكمال الحجز</span>
  <div class="appointments-table-container" id="appointmentsTableWrap">
    <table class="appointments-table" id="appointmentsTable">
      <thead>
        <tr>
          <th>الخدمة</th>
          <th>نوع الخدمة</th>
          <th>التاريخ</th>
          <th>الوقت</th>
          <th>الحالة</th>
        </tr>
      </thead>
      <tbody>
        <!-- ستضاف الصفوف تلقائيًا -->
      </tbody>
    </table>
  </div>

  <footer>
    جميع الحقوق محفوظة © مجمع فينكس الطبي 2025
  </footer>

  <script>
    async function fetchSlotsFromGoogleSheet() {
      try {
        const response = await fetch(
  'https://docs.google.com/spreadsheets/d/e/2PACX-1vThUdJdow1cEIUJhrH9Sbvtgmrl0q4Q7f-WtegrLoxoigvHOXosVv6pjEKP9yKfCWselFbGO5l4yZI1/pub?output=csv&nocache=' + Date.now(),
  { headers: { 'Cache-Control': 'no-cache' } }
);
        const csvText = await response.text();

        const rows = csvText.trim().split('\n').map(row => row.split(','));
        const headers = rows[0];
        const dataRows = rows.slice(1);

        const tableBody = document.querySelector("#appointmentsTable tbody");
        tableBody.innerHTML = "";

        dataRows.forEach(row => {
          const record = {};
          headers.forEach((header, i) => {
            record[header.trim()] = row[i]?.trim();
          });

          const service      = record["الخدمة"];
          const serviceType  = record["نوع الخدمة"] || "";
          const date         = record["التاريخ"];
          const time         = record["الوقت"];
          const status       = record["الحالة"];
          const isAvailable  = status && status.includes("متاح");
          const tr = document.createElement('tr');
          tr.className = isAvailable ? 'available' : 'booked';

          tr.innerHTML = `
            <td>${service}</td>
            <td>${serviceType}</td>
            <td>${date}</td>
            <td>${time}</td>
            <td class="status">
              <span class="status-badge ${isAvailable ? 'available' : 'booked'}">
                <i class="fa-${isAvailable ? 'check' : 'times'}-circle"></i>
                ${isAvailable ? 'متاح' : 'محجوز'}
              </span>
            </td>
          `;

          if (isAvailable) {
            tr.style.cursor = "pointer";
            tr.title = "اضغط للحجز";
            tr.addEventListener('click', () => {
              localStorage.setItem('selectedService', service);
              localStorage.setItem('selectedServiceType', serviceType);
              localStorage.setItem('selectedDate', date);
              localStorage.setItem('selectedTime', time);
              window.location.href = 'confirm.html';
            });
          }
          tableBody.appendChild(tr);
        });
      } catch (error) {
        document.getElementById('appointmentsTableWrap').innerHTML =
          '<p style="color:red; text-align:center; font-weight:bold; margin-top:30px;">⚠️ حدث خطأ أثناء تحميل المواعيد.</p>';
      }
    }

    window.onload = fetchSlotsFromGoogleSheet;
  </script>
</body>
</html>
