<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تأكيد الحجز - مجمع فينكس الطبي</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .confirm-main {
      max-width: 420px;
      margin: 40px auto 35px auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 30px #e2e2e2;
      padding: 30px 28px 15px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .phoenix-logo {
      width: 90px;
      margin-bottom: 16px;
      margin-top: -7px;
    }
    .confirm-main h2 {
      font-size: 1.65em;
      color: #2187bf;
      margin-bottom: 17px;
      font-weight: bold;
      letter-spacing: 0.7px;
    }
    label {
      float: right;
      margin: 9px 0 4px 0;
      color: #333;
      font-size: 1em;
      font-weight: bold;
    }
    input[type="text"], input[type="date"], input[type="tel"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1.5px solid #e3e8ee;
      font-size: 1.08em;
      background: #f7fafc;
      box-sizing: border-box;
      transition: border 0.2s;
    }
    input:focus {
      border: 1.5px solid #c68c0f;
      outline: none;
    }
    input[readonly] {
      background: #f0f0f0;
      color: #888;
      cursor: not-allowed;
    }
    .btn-main {
      width: 100%;
      padding: 12px 0;
      font-size: 1.12em;
      border-radius: 13px;
      border: none;
      background: linear-gradient(90deg,#ff7b00 60%,#ff9500b6 110%);
      color: #fff;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.22s, box-shadow 0.22s;
      box-shadow: 0 1px 12px #000000a0;
    }
    .btn-main:active {
      background: linear-gradient(90deg,#1c5d8a 60%,#1e9fc9 110%);
    }
    #otpSection {
      display: none;
      margin-top: 12px;
    }
    #message {
      margin-top: 13px;
      font-weight: bold;
      font-size: 1.06em;
      color: #17a970;
      min-height: 22px;
    }
    .social-icons {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-right: 22px;
    }
    .social-icons .social-icon {
      font-size: 1.3em;
      padding: 0 2px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: #000000;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 1px 6px #000000b6;
      margin-left: 2.5px;
      text-decoration: none;
    }
    .social-icon.wa    { color: #3cff00; border: 1.5px solid #000000; }
    .social-icon.insta { color: #ff0055; border: 1.5px solid #000000; }
    .social-icon.snap  { color: #fff; border: 1.5px solid #000000; background: #181818; }
    .social-icon:hover {
      background: #111;
      box-shadow: 0 2px 14px #000000;
      opacity: 0.96;
    }
    @media (max-width: 600px) {
      .confirm-main {
        padding: 13px 2vw 6px 2vw;
      }
      .phoenix-logo { width: 65px;}
      .social-icons {
        gap: 6px;
        margin-right: 4px;
      }
      .social-icons .social-icon { width: 29px; height: 29px; font-size: 1em;}
    }
  </style>
</head>
<body>
  <!-- الهيدر -->
  <header>
    <div class="container header-flex">
      <div class="logo-container">
        <img src="images/logo phoenix-Photoroom.png" alt="شعار العيادة" class="logo-img" />
      </div>
      <h1>   </h1>
      <nav>
        <ul>
          <li><a href="index.html">الرئيسية</a></li>
          <li><a href="about.html">من نحن</a></li>
          <li><a href="services.html">الخدمات</a></li>
          <li><a href="appointment.html">احجز موعد</a></li>
          <li><a href="contact.html">اتصل بنا</a></li>
          <li class="social-icons">
            <a href="https://wa.me/966531422555" target="_blank" title="واتساب" class="social-icon wa"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.instagram.com/phoenix.shq/" target="_blank" title="انستقرام" class="social-icon insta"><i class="fab fa-instagram"></i></a>
            <a href="https://www.snapchat.com/add/phoenix.shq?share_id=VOXDQhmXrWw&locale=ar-AE" target="_blank" title="سناب شات" class="social-icon snap"><i class="fab fa-snapchat-ghost"></i></a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- نموذج التأكيد -->
  <div class="confirm-main" data-aos="zoom-in">
    <img src="images/logo phoenix-Photoroom.png" class="phoenix-logo" alt="شعار مجمع فينكس">
    <h2>تأكيد الحجز  </h2>
    <form id="confirmForm" autocomplete="off">
      <label for="name">الاسم الكامل:</label>
      <input type="text" id="name" required placeholder="أدخل اسمك الكامل">

      <label for="service">الخدمة المطلوبة:</label>
      <input type="text" id="service" required placeholder="الخدمة" readonly>
      
      <!-- نوع الخدمة -->
      <label for="serviceType">نوع الخدمة:</label>
      <input type="text" id="serviceType" required placeholder="نوع الخدمة" readonly>

      <label for="date">تاريخ الموعد:</label>
      <input type="date" id="date" required readonly>

      <label for="time">وقت الموعد:</label>
      <input type="text" id="time" required placeholder="مثلاً 5:30 مساءً" readonly>

      <label for="phone">رقم الجوال:</label>
      <input type="text" id="phone" required placeholder="9665XXXXXXXX">

      <button type="button" id="sendOtpBtn" class="btn-main">أرسل رمز التحقق عبر واتساب</button>

      <div id="otpSection">
        <input type="text" id="otp" placeholder="رمز التحقق" maxlength="6" style="margin-bottom:6px;">
        <button type="button" id="verifyOtpBtn" class="btn-main">تأكيد الحجز</button>
      </div>
      <div id="message"></div>
    </form>
  </div>

  <!-- الفوتر -->
  <footer>
    <p>© 2025 جميع الحقوق محفوظة لعيادة مجمع فينكس الطبي</p>
  </footer>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // تعبئة بيانات الموعد تلقائيًا من localStorage (وتكون الحقول readonly)
    window.onload = function() {
      document.getElementById('service').value = localStorage.getItem('selectedService') || "";
      document.getElementById('serviceType').value = localStorage.getItem('selectedServiceType') || "";
      document.getElementById('date').value = localStorage.getItem('selectedDate') || "";
      document.getElementById('time').value = localStorage.getItem('selectedTime') || "";
    }

    AOS.init({ duration: 1000, once: true });

    const sendOtpBtn = document.getElementById('sendOtpBtn');
    const verifyOtpBtn = document.getElementById('verifyOtpBtn');
    const otpSection = document.getElementById('otpSection');
    const messageDiv = document.getElementById('message');
    sendOtpBtn.onclick = async function() {
      const phone = document.getElementById('phone').value.trim();
      if (!/^9665\d{8}$/.test(phone)) {
        alert('يرجى إدخال رقم الجوال مثل 9665XXXXXXXX');
        return;
      }
      sendOtpBtn.disabled = true;
      messageDiv.textContent = "جاري الإرسال ...";
      messageDiv.style.color = "#2187bf";
      setTimeout(() => {
        fetch('https://dental-clinic-site-dc3h.onrender.com/send-otp', {
          method: "POST",
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ phone })
        })
        .then(res => res.json())
        .then(data => {
          otpSection.style.display = 'block';
          if (data.success) {
            messageDiv.style.color = "#17a970";
            messageDiv.textContent = "تم إرسال رمز التحقق إلى واتساب.";
          } else {
            messageDiv.style.color = "#d51a1a";
            messageDiv.textContent = "حدث خطأ أثناء إرسال الرمز.";
            sendOtpBtn.disabled = false;
            sendOtpBtn.textContent = "أرسل رمز التحقق عبر واتساب";
          }
        })
        .catch(() => {
          messageDiv.style.color = "#d51a1a";
          messageDiv.textContent = "فشل الاتصال بالخادم.";
          sendOtpBtn.disabled = false;
          sendOtpBtn.textContent = "أرسل رمز التحقق عبر واتساب";
        });
      }, 3000);
    };

    verifyOtpBtn.onclick = async function() {
      const phone = document.getElementById('phone').value.trim();
      const otp = document.getElementById('otp').value.trim();
      const name = document.getElementById('name').value.trim();
      const service = document.getElementById('service').value.trim();
      const serviceType = document.getElementById('serviceType').value.trim();
      const date = document.getElementById('date').value.trim();
      const time = document.getElementById('time').value.trim();

      if (otp.length !== 6) {
        alert("الرجاء إدخال رمز التحقق المكون من 6 أرقام");
        return;
      }
      verifyOtpBtn.disabled = true;
      messageDiv.textContent = "جاري التحقق ...";
      messageDiv.style.color = "#2187bf";
      setTimeout(() => {
        fetch('https://dental-clinic-site-dc3h.onrender.com/verify-otp', {
          method: "POST",
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ phone, otp, name, service, serviceType, date, time })
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            // حفظ التفاصيل وتحويل للنجاح
            localStorage.setItem('successName', name);
            localStorage.setItem('successPhone', phone);
            localStorage.setItem('successService', service);
            localStorage.setItem('successServiceType', serviceType);
            localStorage.setItem('successDate', date);
            localStorage.setItem('successTime', time);
            localStorage.removeItem('selectedService');
            localStorage.removeItem('selectedServiceType');
            localStorage.removeItem('selectedDate');
            localStorage.removeItem('selectedTime');
            window.location.href = "success.html";
          } else {
            messageDiv.style.color = "#d51a1a";
            messageDiv.textContent = data.message || "رمز التحقق غير صحيح!";
            verifyOtpBtn.disabled = false;
            verifyOtpBtn.textContent = "تأكيد الحجز";
          }
        })
        .catch(() => {
          messageDiv.style.color = "#d51a1a";
          messageDiv.textContent = "فشل الاتصال بالخادم.";
          verifyOtpBtn.disabled = false;
          verifyOtpBtn.textContent = "تأكيد الحجز";
        });
      }, 3000);
    };
  </script>
</body>
</html>
