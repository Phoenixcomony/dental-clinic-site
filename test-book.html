<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>حجز موعد</title>
  <style>
    body { font-family: Tahoma, Arial; background: #f8fafc; text-align: center; }
    form { background: #fff; max-width: 420px; margin: 60px auto; padding: 28px 24px 20px; border-radius: 20px; box-shadow: 0 3px 20px #0001; }
    input, select { width: 95%; padding: 10px; margin: 12px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
    button { width: 100%; padding: 12px; background: #0767d0; color: #fff; border: none; border-radius: 12px; font-size: 18px; margin-top: 16px; cursor: pointer;}
    button:hover { background: #054c93; }
    label { font-size: 15px; float: right; }
    .row-btns {display:flex;gap:7px;}
    .row-btns button[type="button"] {width:auto;background:#db9300;}
  </style>
</head>
<body>
  <form id="bookingForm">
    <h2>حجز موعد بالعيادة</h2>
    <label for="name">اسم المريض:</label>
    <input type="text" id="name" name="name" required placeholder="اكتب الاسم الثلاثي" />

    <label for="phone">رقم الجوال:</label>
    <input type="text" id="phone" name="phone" required placeholder="مثال: 05xxxxxxxx" />

    <label for="clinic">اختر العيادة:</label>
    <select id="clinic" name="clinic" required>
      <option value="">اختر العيادة</option>
      <option value="عيادة اسنان 5**الفترة الاولى">عيادة اسنان 5**الفترة الاولى</option>
      <option value="عيادة اسنان 5**الفترة الثانية">عيادة اسنان 5**الفترة الثانية</option>
      <option value="عيادة الاسنان 1**الفترة الاولى">عيادة الاسنان 1**الفترة الاولى</option>
      <option value="عيادة الاسنان 1**الفترة الثانية">عيادة الاسنان 1**الفترة الثانية</option>
      <option value="عيادة الاسنان 2**الفترة الاولى">عيادة الاسنان 2**الفترة الاولى</option>
      <option value="عيادة الاسنان 2**الفترة الثانية">عيادة الاسنان 2**الفترة الثانية</option>
      <option value="عيادة الاسنان 3**الفترة الاولى">عيادة الاسنان 3**الفترة الاولى</option>
      <option value="عيادة الاسنان 3**الفترة الثانية">عيادة الاسنان 3**الفترة الثانية</option>
      <option value="عيادة الاسنان 4**الفترة الاولى">عيادة الاسنان 4**الفترة الاولى</option>
      <option value="عيادة الاسنان 4**الفترة الثانية">عيادة الاسنان 4**الفترة الثانية</option>
      <option value="عيادة التشقير**الفترة الاولى">عيادة التشقير**الفترة الاولى</option>
      <option value="عيادة التشقير**الفترة الثانية">عيادة التشقير**الفترة الثانية</option>
      <option value="عيادة الجلدية والتجميل**الفترة الاولى">عيادة الجلدية والتجميل**الفترة الاولى</option>
      <option value="عيادة الجلدية والتجميل**الفترة الثانية">عيادة الجلدية والتجميل**الفترة الثانية</option>
      <option value="عيادة الليزر (1)**الفترة الاولى">عيادة الليزر (1)**الفترة الاولى</option>
      <option value="عيادة الليزر (1)**الفترة الثانية">عيادة الليزر (1)**الفترة الثانية</option>
      <option value="عيادة الليزر (2)**الفترة الاولى">عيادة الليزر (2)**الفترة الاولى</option>
      <option value="عيادة الليزر (2)**الفترة الثانية">عيادة الليزر (2)**الفترة الثانية</option>
      <option value="عيادة تنظيف البشرة**الفترة الاولى">عيادة تنظيف البشرة**الفترة الاولى</option>
      <option value="عيادة تنظيف البشرة**الفترة الثانية">عيادة تنظيف البشرة**الفترة الثانية</option>
    </select>

    <label for="month">اختر الشهر:</label>
    <select id="month" name="month" required>
      <option value="">اختر الشهر</option>
      <option value="8">أغسطس</option>
      <option value="9">سبتمبر</option>
      <option value="10">أكتوبر</option>
      <option value="11">نوفمبر</option>
      <option value="12">ديسمبر</option>
    </select>

    <div class="row-btns">
      <button type="button" id="searchBtn">بحث</button>
    </div>

    <label for="time">اختر الوقت:</label>
    <select id="time" name="time" required>
      <option value="">يرجى اختيار العيادة والشهر أولاً ثم الضغط على بحث</option>
    </select>

    <button type="submit">احجز الآن</button>
    <div id="result" style="margin: 20px 0; font-size: 17px; color: green"></div>
  </form>

  <script>
    document.getElementById('searchBtn').addEventListener('click', updateTimes);

    async function updateTimes() {
      const clinic = document.getElementById('clinic').value;
      const month  = document.getElementById('month').value;
      const timeSelect = document.getElementById('time');
      if (clinic && month) {
        timeSelect.innerHTML = "<option>...يتم جلب الأوقات الآن...</option>";
        try {
          const res = await fetch('/api/times', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ clinic, month })
          });
          const data = await res.json();
          if (data.times && data.times.length) {
            timeSelect.innerHTML = data.times.map(t => 
              `<option value="${t.value}">${t.label}</option>`
            ).join('');
          } else {
            timeSelect.innerHTML = "<option value=''>لا توجد أوقات متاحة</option>";
          }
        } catch {
          timeSelect.innerHTML = "<option value=''>حدث خطأ أثناء جلب الأوقات</option>";
        }
      } else {
        timeSelect.innerHTML = "<option value=''>يرجى اختيار العيادة والشهر أولاً</option>";
      }
    }

    document.getElementById('bookingForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const name   = document.getElementById('name').value;
      const phone  = document.getElementById('phone').value;
      const clinic = document.getElementById('clinic').value;
      const month  = document.getElementById('month').value;
      const time   = document.getElementById('time').value;

      document.getElementById('result').innerHTML = "⏳ جاري إرسال الطلب ...";
      try {
        const res = await fetch('/api/book', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ name, phone, clinic, month, time })
        });
        const data = await res.json();
        document.getElementById('result').innerHTML = data.msg;
      } catch (err) {
        document.getElementById('result').innerHTML = "❌ حدث خطأ! حاول مرة أخرى";
      }
    });
  </script>
</body>
</html>
